<!-- NAV -->

    <a href="index.html" class="nav-logo">MDR</a>

        <ul class="nav-links" id="navLinks" style="position:static; background:transparent; border:none; padding:0; flex-direction:row; gap:20px;">

<!-- HERO (populated by JS) -->
<div class="proj-hero" id="projHero">
    <div class="hero-bg"    id="heroBg"></div>
    <div class="hero-glow"  id="heroGlow"></div>
    <div class="hero-grid"  id="heroGridBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-badges" id="heroBadges"></div>
        <h1 class="hero-title"  id="heroTitle"></h1>
        <p  class="hero-date"   id="heroDate"></p>
    </div>
</div>

<!-- MAIN CONTENT (populated by JS) -->
<main class="proj-content" id="projContent">
    <div class="loading-state">
        <div class="loading-spinner"></div>
        <p style="color:var(--text-muted)">Loading project…</p>
    </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-btn" id="lb-close" onclick="closeLB()" aria-label="Close">✕</button>
    <button class="lb-btn" id="lb-prev"  onclick="moveLB(-1)"  aria-label="Previous">‹</button>
    <div class="lb-img-wrap"><img id="lb-img" src="" alt="Screenshot"></div>
    <button class="lb-btn" id="lb-next"  onclick="moveLB(1)"   aria-label="Next">›</button>
    <div class="lb-counter" id="lb-count"></div>
</div>

<!-- FOOTER -->
<footer class="proj-footer">
    <a href="index.html" class="footer-back">← Back to Portfolio</a>
