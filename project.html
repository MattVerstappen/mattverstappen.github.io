<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pg-title">Project — Matthew Derek Rall</title>
    <meta name="description" id="pg-desc" content="A project by Matthew Derek Rall — game developer and designer.">
    <link rel="canonical" id="pg-canonical" href="https://matthewderekrall.com/project.html">
    <meta property="og:title" id="og-title" content="Project — Matthew Derek Rall">
    <meta property="og:description" id="og-desc" content="A project by Matthew Derek Rall — game developer and designer.">
    <meta property="og:url" id="og-url" content="https://matthewderekrall.com/project.html">
    <meta property="og:type" content="website">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/favicon_io/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0f0f1a;
            --bg-card:    #1a1a2e;
            --border:     rgba(99,102,241,.15);
            --border-hi:  rgba(99,102,241,.45);
            --accent:     #6366f1;
            --accent-lt:  #818cf8;
            --cyan:       #22d3ee;
            --cyan-lt:    #67e8f9;
            --text:       #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim:   #64748b;
            --gradient:   linear-gradient(135deg,#6366f1,#22d3ee);
        }

        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6; overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* ── NAV ── */
        .proj-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            background: rgba(15,15,26,.9); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border); height: 60px;
            display: flex; align-items: center; padding: 0 24px;
            justify-content: space-between;
        }
        .nav-logo {
            font-weight: 700; font-size: 1.1rem; text-decoration: none;
            background: var(--gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-muted); text-decoration: none;
            font-size: .88rem; font-weight: 500; transition: all .2s;
            border: 1px solid var(--border); padding: 7px 16px; border-radius: 8px;
        }
        .back-btn:hover { color: var(--text); border-color: var(--border-hi); }
        .back-arrow { display: inline-block; transition: transform .2s; }
        .back-btn:hover .back-arrow { transform: translateX(-3px); }

        /* ── HERO ── */
        .proj-hero {
            position: relative; min-height: 72vh;
            display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden; padding-top: 60px;
        }
        .hero-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center top;
            transition: opacity .6s;
        }
        .hero-glow {
            position: absolute; inset: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,.22), transparent),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(34,211,238,.10), transparent);
        }
        .hero-grid {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(99,102,241,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(15,15,26,.1) 0%,
                rgba(15,15,26,.45) 35%,
                rgba(15,15,26,.88) 70%,
                #0f0f1a 100%
            );
        }
        .hero-content {
            position: relative; z-index: 1;
            max-width: 920px; width: 100%; margin: 0 auto;
            padding: 60px 24px 56px;
        }
        .hero-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 5px;
            font-size: .68rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
        }
        .b-type   { background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:var(--accent-lt); }
        .b-degree { background:rgba(99,102,241,.1);  border:1px solid rgba(99,102,241,.2); color:var(--accent-lt); }
        .b-genre  { background:rgba(168,85,247,.12); border:1px solid rgba(168,85,247,.28); color:#d8b4fe; }
        .b-event  { background:rgba(250,204,21,.1);  border:1px solid rgba(250,204,21,.3); color:#fde68a; }
        .hero-title {
            font-size: clamp(2rem, 5.5vw, 3.6rem); font-weight: 700;
            line-height: 1.1; margin-bottom: 14px;
        }
        .hero-date { font-size: .85rem; color: var(--text-muted); }

        /* ── CONTENT AREA ── */
        .proj-content {
            max-width: 920px; margin: 0 auto; padding: 8px 24px 80px;
        }
        .content-block { margin-bottom: 52px; }
        .block-label {
            font-size: .72rem; font-weight: 600; color: var(--cyan);
            text-transform: uppercase; letter-spacing: .12em;
            display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
        }
        .block-label::before { content:''; width:20px; height:2px; background:var(--cyan); flex-shrink:0; }
        hr.divider { border:none; border-top:1px solid var(--border); margin: 48px 0; }

        /* ── AWARDS ── */
        .awards-list { display: flex; flex-direction: column; gap: 10px; }
        .award-row {
            display: flex; align-items: center; gap: 14px;
            background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.2);
            border-radius: 10px; padding: 14px 20px; transition: border-color .2s;
        }
        .award-row:hover { border-color: rgba(251,191,36,.45); }
        .award-icon { font-size: 1.4rem; flex-shrink: 0; }
        .award-text { font-size: .95rem; font-weight: 500; color: #fde68a; }

        /* ── SUMMARY ── */
        .summary-text { color: var(--text-muted); font-size: 1rem; line-height: 1.85; }

        /* ── ITCH WIDGET ── */
        .itch-wrap {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 24px; overflow: hidden;
        }
        .itch-wrap iframe { display: block; width: 100%; height: 171px; border: none; border-radius: 8px; }

        /* ── GALLERY ── */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }
        .gal-item {
            position: relative; aspect-ratio: 16/9; overflow: hidden;
            border-radius: 10px; border: 1px solid var(--border);
            cursor: pointer; transition: border-color .25s, transform .25s;
        }
        .gal-item:hover { border-color: var(--accent); transform: scale(1.02); }
        .gal-item img { width:100%; height:100%; object-fit:cover; display:block; transition: transform .35s; }
        .gal-item:hover img { transform: scale(1.06); }
        .gal-zoom {
            position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            background:rgba(15,15,26,.45); opacity:0; transition:opacity .25s; font-size:1.6rem;
        }
        .gal-item:hover .gal-zoom { opacity:1; }

        /* ── LIGHTBOX ── */
        .lightbox {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(5,5,12,.95);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity .3s;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }
        .lb-img-wrap { max-width: min(92vw, 1280px); max-height: 90vh; display:flex; align-items:center; justify-content:center; }
        .lb-img-wrap img { max-width:100%; max-height:90vh; object-fit:contain; border-radius:8px; display:block; }
        .lb-btn {
            position:fixed; background:rgba(15,15,26,.85); border:1px solid var(--border);
            border-radius:50%; color:var(--text); cursor:pointer; width:50px; height:50px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.3rem; transition:all .2s; z-index:1001; line-height:1;
        }
        .lb-btn:hover { background:var(--accent); border-color:var(--accent); }
        #lb-close { top:18px; right:18px; font-size:1.5rem; }
        #lb-prev  { left:18px; top:50%; transform:translateY(-50%); }
        #lb-next  { right:18px; top:50%; transform:translateY(-50%); }
        .lb-counter {
            position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
            background:rgba(15,15,26,.85); border:1px solid var(--border);
            color:var(--text-muted); padding:5px 18px; border-radius:100px; font-size:.8rem;
        }

        /* ── STACK / TAGS ── */
        .pill-row { display:flex; flex-wrap:wrap; gap:8px; }
        .pill { background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.2); color:var(--accent-lt); padding:6px 16px; border-radius:100px; font-size:.82rem; }
        .tag-pill { background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.15); color:var(--text-dim); padding:6px 16px; border-radius:100px; font-size:.82rem; }

        /* ── PDF VIEWER ── */
        .pdf-box {
            background: var(--bg-card); border:1px solid var(--border); border-radius:14px; overflow:hidden;
        }
        .pdf-toolbar {
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
            padding:14px 20px; border-bottom:1px solid var(--border);
        }
        .pdf-name { font-size:.85rem; color:var(--text-muted); font-weight:500; word-break:break-all; }
        .pdf-actions { display:flex; gap:10px; flex-shrink:0; }
        .pdf-btn {
            display:inline-flex; align-items:center; gap:5px;
            background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.2);
            color:var(--accent-lt); padding:6px 14px; border-radius:6px;
            font-size:.78rem; font-weight:500; text-decoration:none; transition:all .2s;
        }
        .pdf-btn:hover { background:rgba(99,102,241,.22); border-color:var(--accent); }
        .pdf-frame { width:100%; height:80vh; border:none; display:block; }
        .pdf-fallback {
            padding:40px 24px; text-align:center; color:var(--text-muted); display:none;
        }
        .pdf-fallback a { color:var(--accent-lt); }

        /* ── ARTICLES ── */
        .article-list { display:flex; flex-direction:column; gap:4px; }
        .article-row {
            display:flex; align-items:center; gap:12px; color:var(--text-muted);
            text-decoration:none; padding:12px 16px; border-radius:10px;
            border:1px solid transparent; transition:all .2s; font-size:.88rem;
        }
        .article-row:hover { background:var(--bg-card); border-color:var(--border); color:var(--text); }
        .art-arrow { color:var(--cyan); flex-shrink:0; font-size:1rem; }
        .art-title { flex:1; min-width:0; }
        .art-source {
            font-size:.72rem; color:var(--text-dim);
            background:rgba(99,102,241,.08); border:1px solid var(--border);
            padding:2px 10px; border-radius:4px; white-space:nowrap; flex-shrink:0;
        }

        /* ── FOOTER ── */
        .proj-footer {
            border-top:1px solid var(--border); padding:36px 24px; text-align:center;
        }
        .footer-back {
            display:inline-flex; align-items:center; gap:8px; color:var(--text-muted);
            text-decoration:none; font-size:.9rem; font-weight:500; transition:color .2s;
        }
        .footer-back:hover { color:var(--accent-lt); }

        /* ── LOADING / NOT FOUND ── */
        .loading-state, .notfound-state {
            min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:center; text-align:center; padding:24px;
        }
        .loading-spinner {
            width:40px; height:40px; border:3px solid var(--border);
            border-top-color:var(--accent); border-radius:50%;
            animation:spin .8s linear infinite; margin-bottom:16px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .notfound-state h1 { font-size:2rem; margin-bottom:12px; }
        .notfound-state p { color:var(--text-muted); margin-bottom:28px; }

        /* ── FADE IN ── */
        .fade-up {
            opacity:0; transform:translateY(24px);
            transition:opacity .6s ease, transform .6s ease;
        }
        .fade-up.in { opacity:1; transform:none; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .proj-hero { min-height: 60vh; }
            .hero-content { padding: 40px 18px 40px; }
            .hero-title { font-size: 1.85rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
            .pdf-frame { height: 60vh; }
            .art-source { display: none; }
            #lb-prev { left: 8px; }
            #lb-next { right: 8px; }
            .lb-btn { width:42px; height:42px; }
            .proj-content { padding: 8px 18px 60px; }
        }
        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr 1fr; }
            .hero-title { font-size: 1.6rem; }
            .itch-wrap { padding: 14px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="proj-nav">
    <a href="/" class="nav-logo">MR</a>
    <a href="/" class="back-btn"><span class="back-arrow">←</span> Back to Portfolio</a>
</nav>

<!-- HERO (populated by JS) -->
<div class="proj-hero" id="projHero">
    <div class="hero-bg"    id="heroBg"></div>
    <div class="hero-glow"  id="heroGlow"></div>
    <div class="hero-grid"  id="heroGridBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-badges" id="heroBadges"></div>
        <h1 class="hero-title"  id="heroTitle"></h1>
        <p  class="hero-date"   id="heroDate"></p>
    </div>
</div>

<!-- MAIN CONTENT (populated by JS) -->
<main class="proj-content" id="projContent">
    <div class="loading-state">
        <div class="loading-spinner"></div>
        <p style="color:var(--text-muted)">Loading project…</p>
    </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-btn" id="lb-close" onclick="closeLB()" aria-label="Close">✕</button>
    <button class="lb-btn" id="lb-prev"  onclick="moveLB(-1)"  aria-label="Previous">‹</button>
    <div class="lb-img-wrap"><img id="lb-img" src="" alt="Screenshot"></div>
    <button class="lb-btn" id="lb-next"  onclick="moveLB(1)"   aria-label="Next">›</button>
    <div class="lb-counter" id="lb-count"></div>
</div>

<!-- FOOTER -->
<footer class="proj-footer">
    <a href="/" class="footer-back">← Back to Portfolio</a>
</footer>

<script>
    /* ── DATA ── */
    const DEGREE_SHORT = {
        'BA Honours in Design Leadership':          'BA Honours',
        'BCIS in Game Design and Development':      'BCIS',
        'BCIS in Game Design And Game Development': 'BCIS',
        'Personal': 'Personal',
    };

    const TYPE_LABEL = { game:'Game', research:'Research', app:'App', design:'Design' };

    /* ── INIT ── */
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) {
        showNotFound();
    } else {
        fetch(`projects/${slug}/project.json`)
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(p => { p.slug = slug; renderPage(p); })
            .catch(showNotFound);
    }

    /* ── HERO ── */
    function renderHero(p) {
        const pageTitle = `${p.title} — Matthew Derek Rall`;
        const pageDesc  = (p.summary || '').slice(0, 160);
        const pageUrl   = `https://matthewderekrall.com/project.html?slug=${slug}`;

        document.getElementById('pg-title').textContent    = pageTitle;
        document.getElementById('pg-desc').content         = pageDesc;
        document.getElementById('pg-canonical').href       = pageUrl;
        document.getElementById('og-title').content        = pageTitle;
        document.getElementById('og-desc').content         = pageDesc;
        document.getElementById('og-url').content          = pageUrl;

        const coverSrc = p.coverImage
            ? `projects/${p.slug}/${p.coverImage}`
            : p.photos > 0 ? `projects/${p.slug}/cover.jpg` : null;

        if (coverSrc) {
            document.getElementById('heroBg').style.backgroundImage = `url('${coverSrc}')`;
            document.getElementById('heroGlow').style.display    = 'none';
            document.getElementById('heroGridBg').style.display  = 'none';
        }

        const short = DEGREE_SHORT[p.degree] || '';
        const type  = TYPE_LABEL[p.type]   || (p.type ? p.type.charAt(0).toUpperCase() + p.type.slice(1) : '');

        const badges = [
            type   ? `<span class="badge b-type">${type}</span>`     : '',
            p.genre ? `<span class="badge b-genre">${p.genre}</span>` : '',
            short  ? `<span class="badge b-degree">${short}</span>`   : '',
            p.event ? `<span class="badge b-event">🎮 ${p.event}</span>` : '',
        ].filter(Boolean).join('');

        document.getElementById('heroBadges').innerHTML = badges;
        document.getElementById('heroTitle').textContent  = p.title;
        document.getElementById('heroDate').textContent   = p.date ? `🗓 ${p.date}` : '';
    }

    /* ── CONTENT ── */
    function renderPage(p) {
        renderHero(p);

        const parts = [];

        /* Awards */
        if (p.awards?.length) {
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Awards &amp; Recognition</div>
                    <div class="awards-list">
                        ${p.awards.map(a => `
                            <div class="award-row">
                                <span class="award-icon">🏆</span>
                                <span class="award-text">${a}</span>
                            </div>`).join('')}
                    </div>
                </div>`);
        }

        /* Summary */
        if (p.summary || p.description) {
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">About</div>
                    <p class="summary-text">${p.summary || p.description}</p>
                </div>`);
        }

        /* Itch.io widget */
        if (p.itchId) {
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Play on Itch.io</div>
                    <div class="itch-wrap">
                        <iframe frameborder="0"
                            src="https://itch.io/embed/${p.itchId}?border_width=3&bg_color=0f0f1a&fg_color=f1f5f9&link_color=22d3ee&border_color=6366f1"
                            allowfullscreen title="${p.title} on itch.io">
                        </iframe>
                    </div>
                </div>`);
        }

        /* Screenshot gallery */
        const photos = (p.photoFiles || []).map(f => `projects/${p.slug}/${f}`);
        window._lbImages = photos;

        if (photos.length) {
            const items = photos.map((src, i) => `
                <div class="gal-item" onclick="openLB(${i})" role="button" tabindex="0"
                     onkeydown="if(event.key==='Enter')openLB(${i})">
                    <img src="${src}" alt="${p.title} — screenshot ${i + 1}" loading="lazy">
                    <div class="gal-zoom">🔍</div>
                </div>`).join('');
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Screenshots</div>
                    <div class="gallery-grid">${items}</div>
                </div>`);
        }

        /* Stack */
        if (p.stack?.length) {
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Tech Stack</div>
                    <div class="pill-row">${p.stack.map(s => `<span class="pill">${s}</span>`).join('')}</div>
                </div>`);
        }

        /* Tags */
        if (p.tags?.length) {
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Tags</div>
                    <div class="pill-row">${p.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>
                </div>`);
        }

        /* External links */
        const extLinks = [];
        if (p.links) {
            const LABELS = { github:'⌥ GitHub', itch:'🎮 Itch.io', video:'▶ Video', doi:'📄 DOI', live:'🌐 Live' };
            for (const [k, url] of Object.entries(p.links)) {
                extLinks.push(`<a href="${url}" target="_blank" rel="noopener" class="pdf-btn">${LABELS[k] || k}</a>`);
            }
        }
        if (extLinks.length) {
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Links</div>
                    <div style="display:flex;flex-wrap:wrap;gap:10px">${extLinks.join('')}</div>
                </div>`);
        }

        /* PDF viewer */
        if (p.file) {
            const url = `projects/${p.slug}/${p.file}`;
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Document</div>
                    <div class="pdf-box">
                        <div class="pdf-toolbar">
                            <span class="pdf-name">${p.file}</span>
                            <div class="pdf-actions">
                                <a href="${url}" target="_blank" class="pdf-btn">↗ Open in New Tab</a>
                                <a href="${url}" download       class="pdf-btn">⬇ Download</a>
                            </div>
                        </div>
                        <iframe class="pdf-frame" src="${url}" title="Document viewer"
                            onload="this.previousElementSibling && true"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                        </iframe>
                        <div class="pdf-fallback">
                            <p>Your browser could not display the PDF inline.</p>
                            <p style="margin-top:12px">
                                <a href="${url}" target="_blank">Open in new tab</a> &nbsp;·&nbsp;
                                <a href="${url}" download>Download</a>
                            </p>
                        </div>
                    </div>
                </div>`);
        }

        /* Press / articles */
        if (p.articles?.length) {
            const rows = p.articles.map(a => `
                <a href="${a.url}" target="_blank" rel="noopener" class="article-row">
                    <span class="art-arrow">↗</span>
                    <span class="art-title">${a.title}</span>
                    ${a.source ? `<span class="art-source">${a.source}</span>` : ''}
                </a>`).join('');
            parts.push(`
                <div class="content-block fade-up">
                    <div class="block-label">Press &amp; Articles</div>
                    <div class="article-list">${rows}</div>
                </div>`);
        }

        document.getElementById('projContent').innerHTML =
            parts.join('<hr class="divider">');

        /* Trigger fade-in */
        requestAnimationFrame(() => {
            const io = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
            }, { threshold: 0.08 });
            document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
        });
    }

    /* ── LIGHTBOX ── */
    let _lbIdx = 0;

    function openLB(i) {
        _lbIdx = i;
        syncLB();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLB() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }
    function moveLB(dir) {
        const len = (window._lbImages || []).length;
        _lbIdx = (_lbIdx + dir + len) % len;
        syncLB();
    }
    function syncLB() {
        const imgs = window._lbImages || [];
        document.getElementById('lb-img').src = imgs[_lbIdx] || '';
        document.getElementById('lb-count').textContent = `${_lbIdx + 1} / ${imgs.length}`;
        document.getElementById('lb-prev').style.visibility = imgs.length > 1 ? 'visible' : 'hidden';
        document.getElementById('lb-next').style.visibility = imgs.length > 1 ? 'visible' : 'hidden';
    }
    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeLB();
    });
    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape')     closeLB();
        if (e.key === 'ArrowLeft')  moveLB(-1);
        if (e.key === 'ArrowRight') moveLB(1);
    });

    /* ── NOT FOUND ── */
    function showNotFound() {
        document.getElementById('projHero').style.display = 'none';
        document.getElementById('projContent').innerHTML = `
            <div class="notfound-state">
                <h1>Project Not Found</h1>
                <p>The project you're looking for doesn't exist or has been moved.</p>
                <a href="/" class="back-btn"><span class="back-arrow">←</span> Back to Portfolio</a>
            </div>`;
    }
</script>
</body>
</html>
